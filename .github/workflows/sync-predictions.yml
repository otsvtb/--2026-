function updatePredictions() {
  // Получаем активную таблицу
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  
  // Укажите здесь точное название вашего листа вместо 'Прогнозы'
  const sheetName = 'Прогнозы'; 
  const sheet = ss.getSheetByName(sheetName);
  
  // Проверка: существует ли такой лист
  if (!sheet) {
    Logger.log('Лист с именем "' + sheetName + '" не найден.');
    return;
  }

  // Пример действия: читаем данные из диапазона A2:D10
  // Вы можете изменить диапазон на нужный вам, например 'A1:Z100'
  const range = sheet.getRange('A2:D10');
  const values = range.getValues();
  
  // Пример действия: записываем текущую дату и время в ячейку F1
  sheet.getRange('F1').setValue(new Date());
  
  // Пример действия: выводим в журнал количество обработанных строк
  Logger.log('Обновлено данных на листе ' + sheetName + ': ' + values.length + ' строк.');
}
